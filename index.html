<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Modern Tech Store</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Loading Overlay -->
    <div class="loader">
        <div class="loader-bar"></div>
    </div>

    <!-- Glassmorphism Header -->
    <header class="header">
        <nav class="nav container">
            <a href="#" class="logo">LUMINA<span>.</span></a>
            <ul class="nav-links">
                <li><a href="#home" class="nav-item">Home</a></li>
                <li><a href="#products" class="nav-item">Collection</a></li>
                <li><a href="#contact" class="nav-item">Contact</a></li>
            </ul>
            <div class="header-actions">
                <button class="cart-trigger" id="cart-toggle">
                    <span class="cart-text">Cart</span>
                    <span id="cart-count">0</span>
                </button>
            </div>
        </nav>
    </header>

    <main>
        <!-- Hero Section with Gradient Glow -->
        <section id="home" class="hero">
            <div class="hero-glow"></div>
            <div class="hero-content container">
                <h1 class="reveal">Next Generation.</h1>
                <p class="reveal-delay">Precision-engineered products for the modern minimalist.</p>
                <div class="hero-btns reveal-delay-2">
                    <a href="#products" class="btn-premium">Explore Collection</a>
                </div>
            </div>
        </section>


        <!-- Product Section -->
        <section id="products" class="products container">
            <div class="section-header">
                <h2 class="reveal">The Collection</h2>
                <p class="reveal">Hand-picked premium tech essentials.</p>
            </div>
            <div class="product-grid" id="product-list">
                <!-- Injected via JS -->
            </div>
        </section>

        <!-- Contact Section -->
        <section id="contact" class="contact container">
            <div class="contact-wrapper reveal">
                <div class="contact-info">
                    <h2>Let's Talk.</h2>
                    <p>Have a question about our boutique collection? Reach out.</p>
                </div>
                <form id="contact-form" class="premium-form">
                    <div class="input-group">
                        <input type="text" id="name" placeholder="Name" required>
                    </div>
                    <div class="input-group">
                        <input type="email" id="email" placeholder="Email" required>
                    </div>
                    <textarea id="message" rows="4" placeholder="Your Message" required></textarea>
                    <button type="submit" class="btn-submit">Send Inquiry</button>
                </form>
            </div>
        </section>
  <!-- Side Cart (Slide-out) -->
    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-inner">
            <div class="cart-header">
                <h3>Bag</h3>
                <button id="close-cart">Close</button>
            </div>
            <div id="cart-items" class="cart-body">
                <!-- Cart items -->
            </div>
            <div class="cart-footer">
                <div class="total-row">
                    <span>Total</span>
                    <span id="cart-total-price">$0</span>
                </div>
                <button class="btn-checkout">Checkout Now</button>
            </div>
        </div>
    </div>


    </main>

    <script src="script.js"></script>
</body>

</html>
