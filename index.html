<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Modern Tech Store</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Loading Overlay -->
    <div class="loader">
        <div class="loader-bar"></div>
    </div>

    <!-- Glassmorphism Header -->
    <header class="header">
        <nav class="nav container">
            <a href="#" class="logo">LUMINA<span>.</span></a>
            <ul class="nav-links">
                <li><a href="#home" class="nav-item">Home</a></li>
                <li><a href="#products" class="nav-item">Collection</a></li>
                <li><a href="#contact" class="nav-item">Contact</a></li>
            </ul>
            <div class="header-actions">
                <button class="cart-trigger" id="cart-toggle">
                    <span class="cart-text">Cart</span>
                    <span id="cart-count">0</span>
                </button>
            </div>
        </nav>
    </header>

    <main>
        <!-- Hero Section with Gradient Glow -->
        <section id="home" class="hero">
            <div class="hero-glow"></div>
            <div class="hero-content container">
                <h1 class="reveal">Next Generation.</h1>
                <p class="reveal-delay">Precision-engineered products for the modern minimalist.</p>
                <div class="hero-btns reveal-delay-2">
                    <a href="#products" class="btn-premium">Explore Collection</a>
                </div>
            </div>
        </section>

        
        <!-- Product Section -->
        <section id="products" class="products container">
            <div class="section-header">
                <h2 class="reveal">The Collection</h2>
                <p class="reveal">Hand-picked premium tech essentials.</p>
            </div>
            <div class="product-grid" id="product-list">
                <!-- Injected via JS -->
            </div>
        </section>


    </main>

    <script src="script.js"></script>
</body>

</html>
